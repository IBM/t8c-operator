apiVersion: charts.helm.k8s.io/v1
kind: Xl
metadata:
  name: xl-release
spec:
  # This configuration file is used for production.
  # Default values copied from <project_dir>/helm-charts/xl/values.yaml

  # Default values for xl.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.

  # Any changes run : kubectl apply -f deploy/crds/charts_v1alpha1_xl_cr.yaml -n turbonomic
  properties:
    global:
      featureFlags:
        enableHostingInfoTelemetry: true

  # Global settings
  global:
    deploymentMode: PARKING
    repository: icr.io/cpopen/turbonomic
    tag: 8.19.5
    externalIP: 10.0.2.15
    externalDbIP: 10.0.2.15
    externalTimescaleDBIP: 10.0.2.15
    enableExternalSecrets: true
    telemetry:
      automatic:
        enabled: true
      enabled: true
      metricFederatedSystem:
        enabled: true
      plg:
        enabled: false
      shareTelemetry: FORCE_ON
    secret: <TELEMETRY_SECRET>

  grafana:
    # Grafana is disabled by default. To enable it, uncomment:
    enabled: false
    adminPassword: passwordPlaceholder
    grafana.ini:
      database:
        # Store data in sqlite3 (no persistence across restarts) by default.
        # To persist, uncomment:
        type: postgres
        password: passwordPlaceholder

  # Component selector - Probes
  actionscript:
    enabled: false
  actionstream-kafka:
    enabled: false
  appdynamics:
    enabled: false
  aws:
    enabled: true
  azure:
    enabled: true
  dynatrace:
    enabled: false
  gcp:
    enabled: true
  oci:
    enabled: false
  hpe3par:
    enabled: false
  horizon:
    enabled: false
  hyperflex:
    enabled: false
  hyperv:
    enabled: false
  ibmstorage-flashsystem:
    enabled: false
  kubeturbo:
    enabled: false
  netapp:
    enabled: false
  nutanix:
    enabled: false
  oneview:
    enabled: false
  prometurbo:
    enabled: false
  pure:
    enabled: false
  prometheus-mysql-exporter:
    enabled: false
    mysql:
      user: root
      pass: vmturbo
  prometheus:
    enabled: true
  scaleio:
    enabled: false
  servicenow:
    enabled: false
  ucs:
    enabled: false
  vcenter:
    enabled: false
  vmax:
    enabled: false
  vmm:
    enabled: false
  wmi:
    enabled: false
  snmp:
    enabled: false
  mssql:
    enabled: false
  mysql:
    enabled: false
  oracle:
    enabled: false
  tomcat:
    enabled: false
  jvm:
    enabled: false
  newrelic:
    enabled: false
  udt:
    enabled: false
  websphere:
    enabled: false
  powervm:
    enabled: false
  weblogic:
    enabled: false
  xen:
    enabled: false
  instana:
    enabled: false
  suspend:
    enabled: true
  datadog:
    enabled: false
  metrics-processor:
    enabled: false
  oauth2:
    enabled: true
  container-action-cost:
    enabled: false
  server-power-modeler:
    enabled: false
  cloud-optimizer:
    enabled: false
  sustainability:
    enabled: false
  metadata:
    enabled: false
  webhook:
    enabled: false