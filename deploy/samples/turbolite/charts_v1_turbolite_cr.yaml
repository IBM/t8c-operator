---
apiVersion: charts.helm.k8s.io/v1
kind: Xl
metadata:
  name: xl-release
spec:
  # This configuration file is used for production.
  # Default values copied from <project_dir>/helm-charts/xl/values.yaml

  # Default values for turbolite deployment.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.

  # Any changes run : kubectl apply -f charts_v1_turbolite_cr.yaml -n turbonomic

  # Global settings
  global:
    turboLite:
      enabled: true
    repository: icr.io/cpopen/turbonomic
    tag: 8.20.2
    externalIP: 10.0.2.15
    externalDbIP: 10.0.2.15
    externalTimescaleDBIP: 10.0.2.15
    enableExternalSecrets: true

  # Most components are disabled by helper templates when turboLite.enabled is set to true.
  
  # Required: Enable Instana  for TurboLite
  instana:
    enabled: true
  concert-turbo:
    enabled: true
